<main class="app-shell" id="asset-calculator">
  <header class="topbar">
    <a class="brand" href="#catalog"><span class="brand-mark">✦</span> Bunni's Assets</a>
    <div class="topbar-note">Asset cost calculator</div>
  </header>

  <section class="hero">
    <div>
      <p class="eyebrow">YOUR ROBLOX ASSETS, ADDED UP</p>
      <h1>Pick your favorites <span>♡</span></h1>
      <p class="intro">Tap an asset to add or remove it from your total cost.</p>
    </div>
    <div class="sparkles"><span>✦</span><span>✧</span><span>✦</span></div>
  </section>

  <nav class="category-nav" id="category-nav"></nav>

  <section class="catalog-section" id="catalog">
    <div class="catalog-heading">
      <p class="eyebrow">CATALOG</p>
      <p id="item-count" class="item-count"></p>
    </div>
    <div class="asset-grid" id="asset-grid"></div>
  </section>

  <aside class="total-box">
    <div class="total-heading">
      <span>YOUR TOTAL</span>
      <span class="selection-count" id="selection-count">0 selected</span>
    </div>
    <strong id="total-robux">R$ 0</strong>
    <span class="euro-total" id="total-euros">€0.00</span>
    <div class="total-divider"></div>
    <p>Click any card to update your total.</p>
  </aside>
</main>
